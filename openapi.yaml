openapi: 3.1.0
info:
  title: Core Business API - Smart Campus
  version: 1.0.0
  description: API do Core Business cung cấp để Access Gate kiểm tra quyền ra/vào và truy xuất chính sách.
  contact:
    name: Nhóm A6 - Core Business
    email: contact@a6-corebusiness.dnu.edu.vn

servers:
  - url: http://localhost:4010
    description: Mock server (Prism)
  - url: http://core-business:8000
    description: Local Docker environment

paths:
  /access/check:
    post:
      tags: [access]
      summary: Kiểm tra quyền ra/vào
      description: Access Gate gọi API này truyền dữ liệu thẻ và cổng để Core Business ra quyết định allow/deny dựa trên policy hiện hành.
      operationId: checkAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessRequest'
      responses:
        '200':
          description: Đã đánh giá xong quyền truy cập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDecision'
        '400':
          description: Dữ liệu gửi lên không hợp lệ
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /policies/access/{policyId}:
    get:
      tags: [policies]
      summary: Lấy thông tin chính sách ra/vào
      description: Lấy chi tiết thông tin của một chính sách cấu hình hệ thống bằng ID. Trả về cấu trúc đa hình (TimeBased hoặc RoleBased).
      operationId: getAccessPolicy
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trả về thông tin chính sách
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '404':
          description: Không tìm thấy chính sách
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /decisions/{decisionId}:
    get:
      tags: [decisions]
      summary: Xem lại quyết định đã lưu
      description: Truy xuất lại lịch sử của một quyết định ra/vào cụ thể đã được hệ thống ghi nhận.
      operationId: getDecision
      parameters:
        - name: decisionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lịch sử quyết định
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDecision'

  /health:
    get:
      tags: [system]
      summary: Kiểm tra trạng thái service
      description: Endpoint dùng để hệ thống hoặc API Gateway ping kiểm tra xem Core Business có đang hoạt động hay không.
      operationId: checkHealth
      responses:
        '200':
          description: Service hoạt động bình thường
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

components:
  schemas:
    AccessRequest:
      type: object
      required:
        - cardId
        - gateId
        - direction
      properties:
        cardId:
          type: string
          example: "RFID-2026-001"
        gateId:
          type: string
          example: "gate-main"
        direction:
          type: string
          enum: [IN, OUT]
        idempotencyKey:
          type: string
          example: "req-12345-abcde"

    AccessDecision:
      type: object
      required:
        - allow
        - reasonCode
        - decisionId
      properties:
        decisionId:
          type: string
          example: "DEC-8899"
        allow:
          type: boolean
          example: true
        reasonCode:
          type: string
          example: "VALID_CARD"
        policyId:
          type: string
          example: "POL-STUDENT-01"
        expiresAt:
          type: string
          format: date-time
          example: "2026-05-02T09:10:00Z"
        operatorNote:
          type: [string, "null"]
          description: Ghi chú của bảo vệ nếu có (thỏa mãn yêu cầu union type)
          example: null

    Policy:
      type: object
      required:
        - policyType
      properties:
        policyType:
          type: string
      discriminator:
        propertyName: policyType
        mapping:
          timeBased: '#/components/schemas/TimeBasedPolicy'
          roleBased: '#/components/schemas/RoleBasedPolicy'

    TimeBasedPolicy:
      type: object
      allOf:
        - $ref: '#/components/schemas/Policy'
      properties:
        allowedHours:
          type: string
          example: "07:00-18:00"

    RoleBasedPolicy:
      type: object
      allOf:
        - $ref: '#/components/schemas/Policy'
      properties:
        allowedRoles:
          type: array
          items:
            type: string
          example: ["STUDENT", "STAFF"]

    ProblemDetails:
      type: object
      description: Chuẩn lỗi RFC 7807 (thỏa mãn yêu cầu Lab)
      properties:
        type:
          type: string
          example: "https://example.com/probs/out-of-credit"
        title:
          type: string
          example: "Invalid Request"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "Thiếu trường cardId bắt buộc."