openapi: 3.1.0

info:
  title: Access Gate API for Core Business
  version: 1.0.0
  description: API contract for Pair-03 Core Business consumes Access Gate data.
  contact:
    name: Core Business Team
    email: namkia205@gmail.com

servers:
  - url: http://localhost:4010

tags:
  - name: Access Logs
    description: Access card swipe logs.

  - name: Gates
    description: Gate realtime status.

paths:
  /access-logs:
    get:
      summary: Get access logs
      description: Retrieve access card swipe logs for rule validation in Core Business.
      operationId: getAccessLogs
      tags:
        - Access Logs
      parameters:
        - name: from
          in: query
          schema:
            type: string
            format: date-time
          description: Start time filter

        - name: to
          in: query
          schema:
            type: string
            format: date-time
          description: End time filter

        - name: gateId
          in: query
          schema:
            type: string

        - name: cardId
          in: query
          schema:
            type: string

      responses:
        "200":
          description: List of access logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccessLog"

              examples:
                success:
                  value:
                    - logId: LOG-001
                      cardId: CARD-123
                      userId: USER-001
                      gateId: GATE-A1
                      zoneId: ZONE-RESTRICTED
                      timestamp: "2026-05-19T10:30:00Z"
                      direction: in
                      result: allowed
                      reason: valid_card

        "400":
          description: Invalid query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /access-logs/{logId}:
    get:
      summary: Get access log detail
      description: Retrieve detailed information of a specific access log.
      operationId: getAccessLogById
      tags:
        - Access Logs
      parameters:
        - name: logId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Access log detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccessLog"
        "404":
          description: Access log not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /gates/{gateId}/status:
    get:
      summary: Get gate status
      description: Retrieve realtime gate status for abnormal behavior detection.
      operationId: getGateStatus
      tags:
        - Gates
      parameters:
        - name: gateId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Gate status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GateStatus"
              examples:
                success:
                  value:
                    gateId: GATE-A1
                    zoneId: ZONE-RESTRICTED
                    status: closed
                    lastUpdated: "2026-05-19T10:30:00Z"
        "404":
          description: Gate not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    AccessLog:
      type: object
      required:
        - logId
        - cardId
        - gateId
        - timestamp
        - direction
        - result
      properties:
        logId:
          type: string
          example: LOG-001
        cardId:
          type: string
          example: CARD-123
        userId:
          type: string
          example: USER-001
        gateId:
          type: string
          example: GATE-A1
        zoneId:
          type: string
          example: ZONE-RESTRICTED
        timestamp:
          type: string
          format: date-time
          example: "2026-05-19T10:30:00Z"
        direction:
          type: string
          enum:
            - in
            - out
          example: in
        result:
          type: string
          enum:
            - allowed
            - denied
            - error
          example: allowed
        reason:
          type: string
          example: valid_card

    GateStatus:
      type: object
      required:
        - gateId
        - status
        - lastUpdated
      properties:
        gateId:
          type: string
          example: GATE-A1
        zoneId:
          type: string
          example: ZONE-RESTRICTED
        status:
          type: string
          enum:
            - open
            - closed
            - locked
            - error
          example: closed
        lastUpdated:
          type: string
          format: date-time
          example: "2026-05-19T10:30:00Z"

    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          example: ACCESS_LOG_NOT_FOUND
        message:
          type: string
          example: Access log not found