openapi: 3.1.0
info:
  title: Core Business API - Smart Campus
  version: 1.0.0
  description: API do Core Business cung cấp để Access Gate kiểm tra quyền ra/vào, truy xuất chính sách và cấu hình webhook.
  contact:
    name: Nhóm A6 - Core Business
    email: contact@a6-corebusiness.dnu.edu.vn

servers:
  - url: http://localhost:4010
    description: Mock server (Prism)
  - url: http://core-business:8000
    description: Local Docker environment

paths:
  /access/check:
    post:
      tags: [access]
      summary: Kiểm tra quyền ra/vào
      description: Access Gate gọi API này truyền dữ liệu thẻ và cổng để Core Business ra quyết định allow/deny dựa trên policy hiện hành.
      operationId: checkAccess
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AccessRequest'
      responses:
        '200':
          description: Đã đánh giá xong quyền truy cập
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDecision'
        '400':
          $ref: '#/components/responses/BadRequest'

  /policies/access:
    get:
      tags: [policies]
      summary: Lấy danh sách các chính sách ra/vào (Có phân trang Cursor)
      description: Trả về danh sách các chính sách hiện có trong hệ thống, áp dụng Cursor-based pagination để tối ưu hiệu năng.
      operationId: listPolicies
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Số lượng item tối đa trả về trong một trang.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Mã mã hóa chứa vị trí của bản ghi tiếp theo để lấy trang kế tiếp.
      responses:
        '200':
          description: Danh sách chính sách kèm meta phân trang
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Policy'
                  nextCursor:
                    type: [string, "null"]
                    example: "eyJpZCI6MTB9"

  /policies/access/{policyId}:
    get:
      tags: [policies]
      summary: Lấy thông tin chi tiết một chính sách
      description: Lấy chi tiết thông tin của một chính sách cấu hình hệ thống bằng ID. Trả về cấu trúc đa hình (TimeBased hoặc RoleBased).
      operationId: getAccessPolicy
      parameters:
        - name: policyId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Trả về thông tin chính sách
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Policy'
        '404':
          $ref: '#/components/responses/NotFound'

  /decisions:
    get:
      tags: [decisions]
      summary: Lấy danh sách lịch sử các quyết định ra/vào (Có phân trang Cursor)
      description: Lấy danh sách toàn bộ các quyết định allow/deny đã lưu trong hệ thống, sử dụng Cursor-based pagination.
      operationId: listDecisions
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
          description: Số lượng quyết định tối đa trong 1 request.
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Con trỏ lấy trang tiếp theo.
      responses:
        '200':
          description: Danh sách quyết định ra/vào
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AccessDecision'
                  nextCursor:
                    type: [string, "null"]
                    example: "Y3Vyc29yX2RlY2lzaW9uXzAwNQ=="

  /decisions/{decisionId}:
    get:
      tags: [decisions]
      summary: Xem lại một quyết định cụ thể
      description: Truy xuất lại lịch sử của một quyết định ra/vào cụ thể đã được hệ thống ghi nhận dựa trên ID.
      operationId: getDecision
      parameters:
        - name: decisionId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Lịch sử quyết định
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccessDecision'
        '404':
          $ref: '#/components/responses/NotFound'

  /health:
    get:
      tags: [system]
      summary: Kiểm tra trạng thái service
      description: Endpoint dùng để hệ thống hoặc API Gateway ping kiểm tra xem Core Business có đang hoạt động hay không.
      operationId: checkHealth
      responses:
        '200':
          description: Service hoạt động bình thường
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

webhooks:
  onAlertTriggered:
    description: Webhook này sẽ bắn sự kiện sang các bên bên thứ ba (hoặc hệ thống giám sát) đăng ký khi có cảnh báo khẩn cấp (Severity High/Critical) xảy ra từ Core Business.
    post:
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - eventId
                - alertId
                - severity
                - message
              properties:
                eventId:
                  type: string
                  format: uuid
                  example: "9b1deb4d-3b7d-4bad-9bdd-2b0d7b3dcb6d"
                alertId:
                  type: string
                  example: "ALT-001"
                severity:
                  type: string
                  enum: [low, medium, high, critical]
                  example: "high"
                message:
                  type: string
                  example: "Phát hiện đối tượng xâm nhập trái phép khu vực máy chủ ngoài giờ hành chính."
                timestamp:
                  type: string
                  format: date-time
                  example: "2026-05-19T13:40:00Z"
      responses:
        '200':
          description: Bên nhận webhook phản hồi xử lý thành công sự kiện.

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  responses:
    BadRequest:
      description: Dữ liệu gửi lên không hợp lệ hoặc sai định dạng JSON Schema
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    NotFound:
      description: Không tìm thấy tài nguyên yêu cầu
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'

  schemas:
    AccessRequest:
      type: object
      required:
        - cardId
        - gateId
        - direction
      properties:
        cardId:
          type: string
          example: "RFID-2026-001"
        gateId:
          type: string
          example: "gate-main"
        direction:
          type: string
          enum: [IN, OUT]
        idempotencyKey:
          type: string
          example: "req-12345-abcde"

    AccessDecision:
      type: object
      required:
        - allow
        - reasonCode
        - decisionId
      properties:
        decisionId:
          type: string
          example: "DEC-8899"
        allow:
          type: boolean
          example: true
        reasonCode:
          type: string
          example: "VALID_CARD"
        policyId:
          type: string
          example: "POL-STUDENT-01"
        expiresAt:
          type: string
          format: date-time
          example: "2026-05-02T09:10:00Z"
        operatorNote:
          type: [string, "null"]
          description: Ghi chú của bảo vệ nếu có (thỏa mãn yêu cầu union type)
          example: null

    Policy:
      type: object
      required:
        - policyId
        - policyType
      properties:
        policyId:
          type: string
          example: "POL-001"
        policyType:
          type: string
      discriminator:
        propertyName: policyType
        mapping:
          timeBased: '#/components/schemas/TimeBasedPolicy'
          roleBased: '#/components/schemas/RoleBasedPolicy'

    TimeBasedPolicy:
      type: object
      allOf:
        - $ref: '#/components/schemas/Policy'
      properties:
        allowedHours:
          type: string
          example: "07:00-18:00"

    RoleBasedPolicy:
      type: object
      allOf:
        - $ref: '#/components/schemas/Policy'
      properties:
        allowedRoles:
          type: array
          items:
            type: string
          example: ["STUDENT", "STAFF"]

    ProblemDetails:
      type: object
      description: Chuẩn lỗi RFC 7807 (thỏa mãn yêu cầu Lab)
      required:
        - title
        - status
        - detail
      properties:
        type:
          type: string
          example: "https://example.com/probs/invalid-request"
        title:
          type: string
          example: "Invalid Request"
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: "Thiếu trường dữ liệu bắt buộc."